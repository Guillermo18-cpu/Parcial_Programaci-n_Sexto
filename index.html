<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contact List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <div class="container py-5">

        <div class="title-header text-center mb-4">
            <i class="bi bi-person-vcard-fill"></i>
            <span>Contactos</span>
        </div>


        <form id="contactForm" class="card p-4 shadow-lg form-card">

            <h4 class="text-center mb-3 title-form">
                <i class="bi bi-person-plus-fill"></i> Nuevo contacto
            </h4>

            <div class="mb-2">
                <input type="text" id="nombre" class="form-control input-custom" placeholder="Nombre completo">
                <small class="error" id="errorNombre"></small>
            </div>

            <div class="mb-2">
                <input type="text" id="apellido" class="form-control input-custom" placeholder="Apellido">
                <small class="error" id="errorApellido"></small>
            </div>

            <div class="mb-2">
                <input type="text" id="telefono" class="form-control input-custom" placeholder="Número de contacto">
                <small class="error" id="errorTelefono"></small>
            </div>

            <div class="mb-2">
                <input type="text" id="ciudad" class="form-control input-custom" placeholder="Ciudad">
                <small class="error" id="errorCiudad"></small>
            </div>

            <div class="mb-3">
                <input type="text" id="direccion" class="form-control input-custom" placeholder="Dirección">
                <small class="error" id="errorDireccion"></small>
            </div>

            <div class="mb-3">
                <label class="mb-2">Género:</label>

                <div class="gender-group">
                    <label class="gender-option">
                        <input type="radio" name="gender" value="male">
                        <i class="bi bi-gender-male"></i> Masculino
                    </label>

                    <label class="gender-option">
                        <input type="radio" name="gender" value="female">
                        <i class="bi bi-gender-female"></i> Femenino
                    </label>
                </div>

                <small class="error" id="errorGenero"></small>
            </div>

            <button class="btn btn-primary w-100 btn-add">Añadir Contacto</button>

        </form>


        <div id="loading" class="text-center mt-3 d-none">
            <div class="spinner-border text-primary"></div>
            <p>Cargando...</p>
        </div>


        <h4 class="mt-4 title-list">
            <i class="bi bi-people-fill"></i> Mis contactos
        </h4>

        <div id="contactList"></div>

    </div>


    <div class="modal fade" id="editModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <h5><i class="bi bi-pencil-square"></i> Editar contacto</h5>

                <div class="mb-2">
                    <input id="editName" class="form-control input-custom" placeholder="Nombre">
                    <small class="error" id="editErrorNombre"></small>
                </div>

                <div class="mb-2">
                    <input id="editLastname" class="form-control input-custom" placeholder="Apellido">
                    <small class="error" id="editErrorApellido"></small>
                </div>

                <div class="mb-2">
                    <input id="editPhone" class="form-control input-custom" placeholder="Teléfono">
                    <small class="error" id="editErrorTelefono"></small>
                </div>

                <div class="mb-2">
                    <input id="editCity" class="form-control input-custom" placeholder="Ciudad">
                    <small class="error" id="editErrorCiudad"></small>
                </div>

                <div class="mb-3">
                    <input id="editAddress" class="form-control input-custom" placeholder="Dirección">
                    <small class="error" id="editErrorDireccion"></small>
                </div>

                <button id="saveEdit" class="btn btn-success w-100">
                    Guardar cambios
                </button>

            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">

                <h5><i class="bi bi-exclamation-triangle-fill"></i> ¿Eliminar contacto?</h5>

                <p class="mb-3">Esta acción no se puede deshacer</p>

                <button id="confirmDelete" class="btn btn-danger w-100">
                    Sí, eliminar
                </button>

            </div>
        </div>
    </div>

    <div class="modal fade" id="successModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center success-modal">

                <div class="success-icon">
                    <i class="bi bi-check-circle-fill"></i>
                </div>

                <h5 id="successMessage">Operación exitosa</h5>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
